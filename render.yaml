services:
  - type: web
    name: chronolens-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./chronolens.db
      - key: CORS_ORIGINS
        sync: false   # set this in the Render dashboard to your Vercel URL
      - key: APP_URL
        sync: false   # set this to your Vercel URL
      - key: SMTP_CONSOLE_MODE
        value: "true"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
